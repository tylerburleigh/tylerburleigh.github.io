name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: myst build --html --ci
      - name: Preserve original PDF URLs
        run: |
          find research/articles -name '*.pdf' | while read src; do
            dest="_build/html/$src"
            mkdir -p "$(dirname "$dest")"
            cp "$src" "$dest"
          done
      - name: Preserve full-text markdown files
        run: |
          find research/articles -name '*.md' ! -name 'index.md' | while read src; do
            dest="_build/html/$src"
            mkdir -p "$(dirname "$dest")"
            cp "$src" "$dest"
          done
      - name: Default light theme
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          root = Path("_build/html")
          marker = "myst-default-theme"
          theme_script_re = re.compile(
              r'<script>\s*const savedTheme = localStorage\.getItem\("myst:theme"\);',
              re.M,
          )
          inject = (
              "<script>\n"
              "  // myst-default-theme\n"
              "  if (window.location.pathname === \"/index\" || window.location.pathname === \"/index.html\") {\n"
              "    window.location.replace(\"/\");\n"
              "  }\n"
              "  if (!localStorage.getItem(\"myst:theme\")) {\n"
              "    localStorage.setItem(\"myst:theme\", \"light\");\n"
              "  }\n"
              "</script>\n"
              "<script>\n"
              "  const savedTheme = localStorage.getItem(\"myst:theme\");"
          )

          for path in root.rglob("*.html"):
              text = path.read_text(encoding="utf-8")
              if marker in text:
                  continue
              if theme_script_re.search(text):
                  text = theme_script_re.sub(inject, text, count=1)
                  path.write_text(text, encoding="utf-8")
          PY
      - name: Add Giscus comments to blog posts
        run: |
          python3 - <<'PY'
          from pathlib import Path

          giscus = """
          <script>
          // giscus-loader
          (function() {
            function loadGiscus() {
              var article = document.querySelector('article');
              if (!article) return;
              var container = document.createElement('div');
              container.className = 'giscus-container';
              container.style.cssText = 'max-width:800px;margin:2rem auto;padding:0 1rem;';
              var script = document.createElement('script');
              script.src = 'https://giscus.app/client.js';
              script.setAttribute('data-repo', 'tylerburleigh/tylerburleigh.github.io');
              script.setAttribute('data-repo-id', 'R_kgDOKMo8ww');
              script.setAttribute('data-category', 'General');
              script.setAttribute('data-category-id', 'DIC_kwDOKMo8w84CY9SM');
              script.setAttribute('data-mapping', 'pathname');
              script.setAttribute('data-strict', '0');
              script.setAttribute('data-reactions-enabled', '1');
              script.setAttribute('data-emit-metadata', '0');
              script.setAttribute('data-input-position', 'top');
              script.setAttribute('data-theme', 'preferred_color_scheme');
              script.setAttribute('data-lang', 'en');
              script.setAttribute('data-loading', 'lazy');
              script.crossOrigin = 'anonymous';
              script.async = true;
              container.appendChild(script);
              article.parentNode.insertBefore(container, article.nextSibling);
            }
            if (document.readyState === 'loading') {
              document.addEventListener('DOMContentLoaded', function() { setTimeout(loadGiscus, 100); });
            } else {
              setTimeout(loadGiscus, 100);
            }
          })();
          </script>
          """

          root = Path("_build/html/blog")
          for path in root.rglob("index.html"):
              text = path.read_text(encoding="utf-8")
              if "giscus-loader" in text:
                  continue
              text = text.replace("</html>", "</html>" + giscus)
              path.write_text(text, encoding="utf-8")
          PY
      - name: Fix sitemap and robots.txt URLs
        run: |
          sed -i 's|http://localhost:[0-9]*|https://tylerburleigh.com|g' _build/html/sitemap.xml
          sed -i 's|http://localhost:[0-9]*|https://tylerburleigh.com|g' _build/html/robots.txt
      - run: |
          cp CNAME _build/html/CNAME
          if [ -f rss.xml ]; then cp rss.xml _build/html/rss.xml; fi
          if [ -f atom.xml ]; then cp atom.xml _build/html/atom.xml; fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
