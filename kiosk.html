<!DOCTYPE html>
<html lang="en">
<head>

<style>
.center-div
{
     position: absolute;
     margin: auto;
     top: 0;
     right: 0;
     bottom: 0;
     left: 0;
     width: 300px;
     height: 300px;
}

.round-button {
	margin: auto;
	width:75%;
}
.round-button-circle {
	width: 100%;
	height:0;
	padding-bottom: 100%;
    border-radius: 50%;
	border:10px solid #cfdcec;
    overflow:hidden;
    
    background: #0d6d5e; 
    box-shadow: 0 0 3px gray;
}
.round-button-circle:hover {
	background: #0a564a;
}
.round-button a {
    display:block;
	float:left;
	width:100%;
	padding-top:50%;
    padding-bottom:50%;
	line-height:1em;
	margin-top:-1em;
    
	text-align:center;
	color:#e2eaf3;
    font-family:Calibre;
    font-size:2em;
    font-weight:bold;
    text-decoration:none;
}
</style>
</head>
<body>

<div class="center-div">

<div class="round-button"><div class="round-button-circle"><a href="https://www.cloverhealth.com/en/?utm_source=Kiosk" class="round-button">Learn About Clover Health</a></div></div>
</div>
</body>
</html>
